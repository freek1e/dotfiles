#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/
#windowrulev2 = noborder, onworkspace:w[t1]
# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 3
    gaps_out = 8

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgb(63,209,185)
    col.inactive_border = rgb(47,173,153)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle

}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 3

    # Change transparency of focused and unfocused windows
    active_opacity = 1
    inactive_opacity = 0.9

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 5
        passes = 3

        new_optimizations = true

        vibrancy = 0.5
    }
}

layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0
  match:namespace = waybar
}


layerrule {
  name = layerrule-2
  blur = on
  ignore_alpha = 0
  match:namespace = nwg-dock
}


layerrule {
  name = layerrule-3
  blur = on
  ignore_alpha = 0
  match:namespace = hyprpanel
}


layerrule {
  name = layerrule-4
  blur = on
  match:namespace = gtk-layer-shell
}


layerrule {
  name = layerrule-5
  blur = on
  ignore_alpha = 0
  match:namespace = wlogout
}


layerrule {
  name = layerrule-6
  blur = on
  ignore_alpha = 0
  match:namespace = notifications
}


layerrule {
  name = layerrule-7
  blur = on
  ignore_alpha = 0
  match:namespace = zen
}




# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint, 
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     2.94,  almostLinear, fade
    animation = workspacesIn,  1,     2.21,  almostLinear, fade
    animation = workspacesOut, 1,     2.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background.
    vrr = 1
}


#############
### INPUT ###
#############

cursor {
    no_warps = true
}


# https://wiki.hypr.land/Configuring/Variables/#input
input {

    kb_layout = tr
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    mouse_refocus = false

    sensitivity = -2

    natural_scroll = true

#    accel_profile = adaptive


    # enabling scroll button
    scroll_method = "on_button_down"
    scroll_button = 275    # the value reported by wev
    # ...


    touchpad {
        natural_scroll = true

    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.8
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, killactive
bind = ALT, Q, killactive
#bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = ALT, SPACE, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

bind = CTRL ALT, T, exec, $terminal
bind = $mainMod SHIFT, E, exec, $browser
#bind = , Insert, exec, octopi

bind = SUPER, G, togglegroup

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, 8, workspace, 8
bind = ALT, 9, workspace, 9
bind = ALT, 0, workspace, 10

bind = SUPER, A, workspace, r-1
bind = SUPER, D, workspace, r+1

bind = SUPER, Z, workspace, e-1
bind = SUPER, C, workspace, e+1

bind = SUPER, X, exec, ~/.config/hypr/scripts/next_empty_ws.sh
bind = SUPER SHIFT, X, exec, ~/.config/hypr/scripts/move_to_next_empty_ws.sh

bind = SUPER SHIFT, S, exec, spotify-launcher

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5
bind = ALT SHIFT, 6, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, 0, movetoworkspace, 10

bind = SUPER SHIFT, A, movetoworkspace, r-1
bind = SUPER SHIFT, D, movetoworkspace, r+1

bind = SUPER SHIFT, Z, movetoworkspace, e-1
bind = SUPER SHIFT, C, movetoworkspace, e+1

bind = ALT, Tab, cyclenext
#bind = ALT SHIFT, Tab, cycleprev
bind = ALT, Tab, bringactivetotop
bind = $mainMod, TAB, exec, rofi -show window

bind = SUPER, TAB, changegroupactive, f
#bind = SUPER SHIFT, TAB, changegroupactive, b



# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

windowrule {
  name = windowrule-1
  fullscreen = on
  match:class = ^(ghostoftsushima|GhostOfTsushima)$
}


windowrule {
  name = windowrule-2
  border_size = 0
  match:class = ^(steam_app_0)$
}


windowrule {
  name = windowrule-3
  border_size = 0
  match:class = ^(steam_app_990080)$
}

windowrule {
  name = windowrule-3
  border_size = 0
  match:title = ^(Blasphemous)$
}

#For floating windows

windowrule {
  name = windowrule-4
  float = on
  match:title = ^(Dosya İşlem Süreci)$
}


windowrule {
  name = windowrule-5
  float = on
  match:title = ^(Dosya Aç)$
}


windowrule {
  name = windowrule-6
  float = on
  match:class = ^(qt-sudo)$
}


windowrule {
  name = windowrule-7
  float = on
  match:class = ^(org.pulseaudio.pavucontrol)$
}


windowrule {
  name = windowrule-8
  float = on
  match:title = (.*yeniden adlandır.*)
}


# Ignore maximize requests from apps. You'll probably like this.
windowrule {
  name = windowrule-9
  suppress_event = maximize
  match:class = .*
}


# Fix some dragging issues with XWayland
windowrule {
  name = windowrule-10
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}


# CS2 blur kapat
windowrule {
  name = windowrule-11
  no_blur = on
  border_size = 0
  fullscreen = on
  opacity = 1.0 override 1.0
  match:class = ^(cs2)$
}



# deadlocked blur kapat
windowrule {
  name = windowrule-12
  no_blur = on
  border_size = 0
  fullscreen = on
  opacity = 1.0 override 1.0
  match:class = ^(deadlocked)$
}




xwayland {
    force_zero_scaling = true
}

#no_gaps_when_only
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule {
  name = windowrule-13
  border_size = 0
  rounding = 0
  match:float = 0
  match:workspace = w[tv1]
}

windowrule {
  name = windowrule-14
  border_size = 0
  rounding = 0
  match:float = 0
  match:workspace = f[1]
}



